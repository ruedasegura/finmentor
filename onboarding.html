<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configura tu negocio - FinMentor AI</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="onboarding-container">
        <div class="onboarding-card">
            <div class="onboarding-header">
                <span class="logo-icon">📊</span>
                <h1>Bienvenido a FinMentor AI</h1>
                <p>Te ayudamos a tomar mejores decisiones financieras</p>
            </div>
            
            <form id="onboardingForm">
                <div class="form-group">
                    <label>📝 ¿A qué te dedicas?</label>
                    <select id="businessType" required>
                        <option value="">Selecciona una opción</option>
                        <option value="freelancer">Freelancer / Consultor</option>
                        <option value="ecommerce">E-commerce / Tienda online</option>
                        <option value="creator">Creador de contenido</option>
                        <option value="agency">Agencia / Estudio</option>
                        <option value="saas">SaaS / Software</option>
                        <option value="other">Otro</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>💰 ¿Cuánto facturas al mes?</label>
                    <div class="currency-input">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="monthlyIncome" placeholder="0" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📉 ¿Cuánto gastas al mes?</label>
                    <div class="currency-input">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="monthlyExpenses" placeholder="0" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Comenzar →</button>
            </form>
            
            <p class="onboarding-footer">En menos de 30 segundos tendrás un diagnóstico completo de tu negocio.</p>
        </div>
    </div>
    
    <script src="firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('onboardingForm');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const user = firebase.auth().currentUser;
                if (!user) {
                    alert('Debes iniciar sesión');
                    window.location.href = 'index.html';
                    return;
                }
                
                const businessType = document.getElementById('businessType').value;
                const monthlyIncome = parseFloat(document.getElementById('monthlyIncome').value);
                const monthlyExpenses = parseFloat(document.getElementById('monthlyExpenses').value);
                
                if (!businessType || !monthlyIncome || !monthlyExpenses) {
                    alert('Por favor completa todos los campos');
                    return;
                }
                
                const btn = form.querySelector('button');
                btn.textContent = 'Analizando tu negocio...';
                btn.disabled = true;
                
                try {
                    const utilidad = monthlyIncome - monthlyExpenses;
                    const margen = monthlyIncome > 0 ? (utilidad / monthlyIncome * 100).toFixed(1) : 0;
                    
                    await firebase.firestore().collection('onboarding').doc(user.uid).set({
                        businessType: businessType,
                        monthlyIncome: monthlyIncome,
                        monthlyExpenses: monthlyExpenses,
                        completedAt: new Date()
                    });
                    
                    await firebase.firestore().collection('financial_data').doc(user.uid).set({
                        ingresos: monthlyIncome,
                        gastos: monthlyExpenses,
                        utilidad: utilidad,
                        margen: margen,
                        saldoActual: monthlyIncome * 3,
                        history: [],
                        updatedAt: new Date()
                    });
                    
                    await firebase.firestore().collection('financial_history').doc(user.uid).set({
                        snapshots: [{
                            date: new Date(),
                            ingresos: monthlyIncome,
                            gastos: monthlyExpenses,
                            utilidad: utilidad,
                            margen: margen
                        }]
                    });
                    
                    window.location.href = 'dashboard.html';
                    
                } catch (error) {
                    alert('Error: ' + error.message);
                    btn.textContent = 'Comenzar →';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
